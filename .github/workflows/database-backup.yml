name: PostgreSQL backup

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: database-backup-main
      cancel-in-progress: false
    steps:
      - name: Pull PostgreSQL 17 client
        run: docker pull postgres:17-bookworm

      - name: Create custom-format dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -Eeuo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "::error::Repository secret DATABASE_URL is not configured"
            exit 1
          fi

          mkdir -p backup
          DUMP_FILE="mrh-academy-${GITHUB_RUN_ID}.dump"
          export DUMP_FILE

          docker run --rm \
            --env DATABASE_URL \
            --env DUMP_FILE \
            --volume "$PWD/backup:/backup" \
            postgres:17-bookworm \
            sh -euc '
              pg_dump \
                --format=custom \
                --no-owner \
                --no-privileges \
                --file="/backup/$DUMP_FILE" \
                "$DATABASE_URL"
              pg_restore --list "/backup/$DUMP_FILE" >/dev/null
            '

          test -s "backup/$DUMP_FILE"

      - name: Upload private backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrh-academy-db-${{ github.run_id }}
          path: backup/*.dump
          retention-days: 7
          if-no-files-found: error
